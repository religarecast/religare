<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Religare Cast</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#0b0b0b;
color:white;
font-family:Inter,sans-serif;

display:flex;
justify-content:center;
align-items:center;

height:100vh;

}

.container{

max-width:550px;
width:90%;
text-align:center;

}

h1{

font-family:Cinzel,serif;
font-size:54px;
letter-spacing:5px;
margin-bottom:10px;

}

h2{

font-size:22px;
font-weight:300;
color:#d6d6d6;
margin-bottom:35px;

}

.frase{

font-size:20px;
font-style:italic;
margin-bottom:50px;
color:#b8b8b8;

}

.botao{

display:block;

text-decoration:none;

background:#1c1c1c;

padding:22px;

margin:18px 0;

border-radius:12px;

color:white;

font-size:20px;

font-weight:600;

transition:.25s;

border:1px solid #2d2d2d;

}

.botao:hover{

background:#8B1E1E;

transform:translateY(-2px);

}

footer{

margin-top:60px;

font-size:13px;

color:#777;

}

</style>

</head>

<body>

<div class="container">

<h1>RELIGARE</h1>

<h2>Aquilo que não se vê.</h2>

<p class="frase">
Toda história merece uma boa pergunta.
</p>

<a class="botao"
href="https://open.spotify.com/show/033sHqwumjdu2yUEmjJFbl?si=9856cf4923024c4c">

🎙 Ouvir no Spotify

</a>

<a class="botao"
href="https://www.instagram.com/religarecast">

📷 Instagram

</a>

<a class="botao"
href="https://youtube.com/@religarecast">

▶ YouTube

</a>

<footer>

© Religare Cast

</footer>

</div>

</body>

</html>
